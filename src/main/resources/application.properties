# =============================================================================
# APPLICATION
# =============================================================================
spring.application.name=task-manager-api
server.port=8080

# =============================================================================
# DATASOURCE (PostgreSQL)
# =============================================================================
# Credentials must align with docker-compose.yml.
# In production, override via environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5433/taskmanager
spring.datasource.username=taskmanager
spring.datasource.password=taskmanager123
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# JPA / HIBERNATE
# =============================================================================
# 'validate' ensures entity mappings match the Flyway-controlled schema at startup.
# Never use 'update' or 'create' in production — schema changes belong in migrations.
spring.jpa.hibernate.ddl-auto=validate

# Disable in production: SQL logging adds overhead and may expose sensitive data.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# FLYWAY
# =============================================================================
# Applies pending versioned migrations at startup.
# Migration history is tracked in the flyway_schema_history table.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =============================================================================
# JWT
# =============================================================================
# Base64-encoded HMAC-SHA256 signing key (minimum 256 bits).
# In production, inject via APP_JWT_SECRET environment variable — never commit real secrets.
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiB0aGF0IGlzIGF0IGxlYXN0IDI1NiBiaXRz
# Token lifetime in milliseconds (86400000 = 24 hours).
app.jwt.expiration-ms=86400000

# =============================================================================
# LOGGING
# =============================================================================
# Reduce to INFO in production to limit log volume.
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=DEBUG
